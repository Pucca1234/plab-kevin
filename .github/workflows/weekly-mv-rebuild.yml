name: Weekly MV Rebuild

# 2026-06-02: 트리거 비활성화
# 분석 백엔드가 BigQuery로 전환(ANALYTICS_BACKEND=bigquery)되어
# Supabase weekly_agg_mv 갱신의 실효성이 없음.
# SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY / SUPABASE_DB_URI 시크릿이
# GitHub Actions에 미등록 상태로 2026-04-07 첫 실행부터 9회 전부 실패.
# 재활성화 시: on: 블록 복구 + GitHub Actions에 Supabase 시크릿 3개 등록 필요.
#
# on:
#   schedule:
#     # Tue 10:00 KST = Tue 01:00 UTC
#     - cron: "0 1 * * 2"
#   workflow_dispatch:

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: "강제 수동 실행 (Supabase 시크릿 등록 후 사용)"
        required: true
        default: "false"

jobs:
  rebuild-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_DB_URI: ${{ secrets.SUPABASE_DB_URI }}
      MV_HEALTHCHECK_WEEKS: "3"
      MV_HEALTHCHECK_METRIC: "total_match_cnt"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify required secrets
        run: |
          set -e
          [ -n "${SUPABASE_URL}" ] || (echo "Missing SUPABASE_URL" && exit 1)
          [ -n "${SUPABASE_SERVICE_ROLE_KEY}" ] || (echo "Missing SUPABASE_SERVICE_ROLE_KEY" && exit 1)
          [ -n "${SUPABASE_DB_URI}" ] || (echo "Missing SUPABASE_DB_URI" && exit 1)

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Rebuild weekly_agg_mv and indexes
        env:
          PGOPTIONS: "-c statement_timeout=0"
        run: |
          psql \
            "${SUPABASE_DB_URI}" \
            -v ON_ERROR_STOP=1 \
            -f supabase/sql/refresh_weekly_agg_mv.sql

      - name: Validate latest weeks after rebuild
        run: |
          psql \
            "${SUPABASE_DB_URI}" \
            -v ON_ERROR_STOP=1 \
            -v check_weeks="${MV_HEALTHCHECK_WEEKS}" \
            -v metric_id="${MV_HEALTHCHECK_METRIC}" \
            -f supabase/sql/validate_recent_refresh.sql
